name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend dependencies
        run: npm install
        working-directory: backend
      - name: Run backend tests
        run: npm test
        working-directory: backend

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  selenium-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    env:
      BASE_URL: http://localhost:3001
      API_URL: http://localhost:5000/api
      BROWSER: chrome
      HEADLESS: "true"
      FRONTEND_URL: http://localhost:3001
      TOKEN_TTL_SECONDS: "3600"
      MOCK_ORDER_FAILURE: "false"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend/frontend dependencies
        run: |
          npm install --prefix backend
          npm install --prefix frontend
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r selenium-tests/requirements.txt
      - name: Start backend
        run: nohup npm run dev --prefix backend > backend.log 2>&1 &
      - name: Start frontend
        run: nohup npm run dev --prefix frontend > frontend.log 2>&1 &
      - name: Wait for apps
        run: |
          for i in {1..60}; do
            curl -sSf http://localhost:5000/api/health && break
            sleep 2
          done
          for i in {1..60}; do
            curl -sSf http://localhost:3001 && break
            sleep 2
          done
      - name: Run selenium tests
        run: pytest selenium-tests/tests --html=selenium-tests/reports/report.html --self-contained-html
      - name: Upload selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: |
            selenium-tests/reports/**
            backend.log
            frontend.log
